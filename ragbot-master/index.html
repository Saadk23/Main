<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O.T.T.O AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #7c3aed; /* Deep Purple */
            --accent: #2dd4bf;  /* Teal/Neon */
            --bg-card: #111827; /* Dark Slate */
            --text-main: #f8fafc;
        }

        body { font-family: 'Outfit', sans-serif; background: #0f172a; }

        /* Floating Trigger - Minimal & Clean */
        #chat-trigger {
            position: fixed; bottom: 30px; right: 30px;
            width: 55px; height: 55px; border-radius: 16px;
            background: var(--primary); color: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1000;
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
            transition: 0.3s;
        }
        #chat-trigger:hover { transform: translateY(-5px) scale(1.05); }

        /* The Widget Box */
        #chat-widget {
            position: fixed; bottom: 100px; right: 30px;
            width: 360px; height: 550px;
            background: var(--bg-card);
            border-radius: 24px; display: none; flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden; z-index: 1000;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Elegant Header */
        .header {
            padding: 20px; background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }
        .header h3 { margin: 0; font-size: 1.4rem; color: white; letter-spacing: 2px; font-weight: 700; }
        .header p { margin: 5px 0 0; font-size: 10px; color: var(--accent); font-weight: 600; text-transform: uppercase; }

        /* Chat Area */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; color: var(--text-main); max-width: 85%; }
        
        .user { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        
        .bot { 
            align-self: flex-start; background: #1f2937; border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Bot internal markdown style */
        .bot p { margin: 0 0 8px 0; }
        .bot strong { color: var(--accent); }

        /* Input Area */
        .input-area { padding: 15px 20px; background: rgba(0,0,0,0.2); display: flex; gap: 10px; align-items: center; }
        
        input { 
            flex: 1; background: #1f2937; border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px; border-radius: 12px; color: white; outline: none; font-size: 13px;
        }
        input:focus { border-color: var(--primary); }

        button { 
            background: var(--primary); border: none; width: 42px; height: 42px; 
            border-radius: 12px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        button:hover { background: #6d28d9; transform: scale(1.05); }

        /* Scrollbar */
        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="chat-trigger">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </div>

    <div id="chat-widget">
        <div class="header">
            <h3>O.T.T.O</h3>
            
        </div>
        <div id="messages"></div>
        <div id="typing-indicator" style="display:none; padding: 0 20px 10px; font-size: 11px; color: var(--accent);">O.T.T.O is typing...</div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
            <button onclick="sendMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        const widget = document.getElementById('chat-widget');
        const trigger = document.getElementById('chat-trigger');
        const msgContainer = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const typing = document.getElementById('typing-indicator');

        trigger.onclick = () => {
            const isHidden = widget.style.display === 'none' || widget.style.display === '';
            widget.style.display = isHidden ? 'flex' : 'none';
            if (isHidden) userInput.focus();
        };

        userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';
            typing.style.display = 'block';

            try {
                const response = await fetch('http://127.0.0.1:8000/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                const data = await response.json();
                typing.style.display = 'none';
                addMessage(data.answer, 'bot');
            } catch (err) {
                typing.style.display = 'none';
                addMessage('FastAPI Server not responding.', 'bot');
            }
        }

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            
            if (role === 'bot') {
                div.innerHTML = marked.parse(text); 
            } else {
                div.innerText = text;
            }

            msgContainer.appendChild(div);
            msgContainer.scrollTo({ top: msgContainer.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
